{% extends 'base.html' %}
{% block title %}Register Staff{% endblock %}
{% block page_title %}Register Staff{% endblock %}
{% block content %}
<div class="page-header">
  <h1><i class="fas fa-user-tie"></i> Register New Staff</h1>
  <a href="{{ url_for('admin.staff_list') }}" class="btn btn-outline"><i class="fas fa-arrow-left"></i> Back</a>
</div>
<div class="card" style="max-width:680px">
  <form method="POST">
    <div class="form-grid">
      <div class="form-group">
        <label>Staff ID <span class="required">*</span></label>
        <input type="text" name="staff_id" class="form-control" required placeholder="e.g. STAFF/CS/001"/>
      </div>
      <div class="form-group">
        <label>Full Name <span class="required">*</span></label>
        <input type="text" name="full_name" class="form-control" required placeholder="Full name"/>
      </div>
      <div class="form-group">
        <label>Email <span class="required">*</span></label>
        <input type="email" name="email" class="form-control" required placeholder="staff@fedpolynas.edu.ng"/>
      </div>
      <div class="form-group">
        <label>Phone</label>
        <input type="text" name="phone" class="form-control" placeholder="08012345678"/>
      </div>
      <div class="form-group">
        <label>Department</label>
        <input type="text" name="department" class="form-control" placeholder="e.g. Computer Science"/>
      </div>
      <div class="form-group">
        <label>Designation</label>
        <input type="text" name="designation" class="form-control" placeholder="e.g. Lecturer, Exam Officer"/>
      </div>
    </div>
    <div class="alert alert-warning mt-2" style="font-size:0.8rem">
      <i class="fas fa-key"></i> Default password: <strong>Staff@FedPoly2024</strong> — Staff must change on first login.
    </div>
    <div style="margin-top:20px;display:flex;gap:12px">
      <button type="submit" class="btn btn-primary btn-lg"><i class="fas fa-user-plus"></i> Register Staff</button>
      <a href="{{ url_for('admin.staff_list') }}" class="btn btn-outline btn-lg">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
